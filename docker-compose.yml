services:
  hardware-reference-bot:
    build: .
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8000}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:' + os.getenv('PORT', '8000') + '/healthz', timeout=2).read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
