display_information:
  name: Hardware Reference Bot
  description: Quick electronics references for Stardance YSWS builders.
  background_color: "#2f4f4f"

features:
  bot_user:
    display_name: Hardware Reference Bot
    always_online: false

  slash_commands:
    - command: /dp-resistor
      url: https://devaansh.hackclub.app/slack/events
      description: Calculate a 4-band or 5-band resistor value.
      should_escape: false

    - command: /dp-datasheet
      url: https://devaansh.hackclub.app/slack/events
      description: Get quick datasheet search links for a part number.
      should_escape: false

    - command: /dp-pinout
      url: https://devaansh.hackclub.app/slack/events
      description: Show a curated MCU pinout and peripheral cheatsheet.
      should_escape: false

oauth_config:
  scopes:
    bot:
      - commands
      - chat:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
